name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install core dependencies
        run: bun install --frozen-lockfile

      - name: Check core
        run: bun run check

      - name: Build CLI
        run: bun run build:cli

  build-cli:
    name: Build CLI (${{ matrix.artifact }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: plansman-linux-x64
            outfile: plansman-linux-x64
          - os: macos-14
            artifact: plansman-darwin-arm64
            outfile: plansman-darwin-arm64
          - os: windows-latest
            artifact: plansman-windows-x64
            outfile: plansman-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone CLI
        shell: bash
        run: |
          mkdir -p dist
          bun build ./surfaces/cli/index.ts --compile --outfile "dist/${{ matrix.outfile }}"
          chmod +x "dist/${{ matrix.outfile }}" || true

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find dist-artifacts -type f -name 'plansman*' | sort)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Plansman CLI release $GITHUB_REF_NAME"
